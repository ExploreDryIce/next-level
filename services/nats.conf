# DVCE Swarm NATS Server Configuration
# JetStream enabled for pattern persistence and replay

listen: 0.0.0.0:4222

# JetStream configuration
jetstream {
    store_dir: ~/.dvce/nats-data
    max_mem: 256MB
    max_file: 2GB
}

# Allow all connections (secured by Tailscale network)
authorization {
    timeout: 10
}

# Logging
log_file: ~/.dvce/logs/nats.log
debug: false
trace: false
