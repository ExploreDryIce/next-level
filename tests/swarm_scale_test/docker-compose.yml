##
## 10+ Node Swarm Scale Test
##
## Spins up a broker + 12 simulated swarm nodes (different domains)
## to test pattern distribution, routing, and quality scoring at scale.
##
## Usage:
##   docker compose up --build
##   docker compose up -d && docker compose logs -f broker
##   docker compose down
##
## What this tests:
##   - Broker handles 12 concurrent connections
##   - Patterns distribute correctly across domains
##   - Quality scoring filters bad patterns
##   - No message loss under load
##   - Reconnection after node restart
##

services:
  broker:
    build:
      context: ../..
      dockerfile: tests/swarm_scale_test/Dockerfile.broker
    ports:
      - "19876:9876"
    volumes:
      - broker_data:/root/.dvce/swarm
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost',9876)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Financial domain nodes (3)
  node-financial-1:
    build:
      context: ../..
      dockerfile: tests/swarm_scale_test/Dockerfile.node
    environment:
      NODE_ID: financial-node-1
      NODE_DOMAIN: financial
      BROKER_HOST: broker
      BROKER_PORT: "9876"
      PATTERN_RATE: "5"
    depends_on:
      broker:
        condition: service_healthy

  node-financial-2:
